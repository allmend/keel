# Release pipeline — runs on version tags (v0.1.0-alpha, v0.2.0, …).
#
# Produces:
#   - Static binaries: linux x86_64 + arm64 (MUSL, fully static),
#     FreeBSD x86_64 (mostly static). aarch64-unknown-freebsd is a Rust
#     tier-3 target (no prebuilt std) and is not built.
#   - Multi-arch container (linux/amd64 + linux/arm64) on ghcr.io, FROM scratch.
#     Tagged {version}; also {major}.{minor} and latest for stable (non-pre) tags.
#   - A GitHub Release with the tarballs, SHA256SUMS, and pull instructions.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/keel

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    # FreeBSD (x86_64-unknown-freebsd) is currently not built: pingora-core 0.8
    # pins nix 0.24, which no longer compiles against modern libc's FreeBSD
    # kevent ABI. Revisit when pingora bumps its nix dependency.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux_x86_64
            target: x86_64-unknown-linux-musl
          - name: linux_arm64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --locked --target ${{ matrix.target }} --features vendored-openssl

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="keel-${VERSION}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          cp "target/${{ matrix.target }}/release/keel" "dist/${PKG}/"
          cp README.md LICENSE CHANGELOG.md keel.yaml "dist/${PKG}/"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: pkg-${{ matrix.name }}
          path: dist/*.tar.gz
          retention-days: 7

      # Raw binaries for the container job (linux targets only)
      - name: Upload binary
        if: startsWith(matrix.name, 'linux')
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/keel
          retention-days: 7

  keelctl:
    name: keelctl ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # keelctl has no pingora/OpenSSL dependency, so it builds for platforms
    # where full keel cannot (FreeBSD) and as tiny static binaries.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux_x86_64,   os: ubuntu-latest, target: x86_64-unknown-linux-musl,  cross: true }
          - { name: linux_arm64,    os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: true }
          - { name: freebsd_x86_64, os: ubuntu-latest, target: x86_64-unknown-freebsd,     cross: true }
          - { name: macos_arm64,    os: macos-14,      target: aarch64-apple-darwin,       cross: false }
          - { name: macos_x86_64,   os: macos-14,      target: x86_64-apple-darwin,        cross: false }
    continue-on-error: ${{ matrix.name == 'freebsd_x86_64' }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked -p keelctl --target ${{ matrix.target }}
          else
            cargo build --release --locked -p keelctl --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="keelctl-${VERSION}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          cp "target/${{ matrix.target }}/release/keelctl" "dist/${PKG}/"
          cp README.md LICENSE "dist/${PKG}/"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: pkg-keelctl-${{ matrix.name }}
          path: dist/*.tar.gz
          retention-days: 7

  container:
    name: Container (ghcr.io)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download linux binaries
        uses: actions/download-artifact@v7
        with:
          pattern: bin-linux_*
          path: bins

      - name: Arrange binaries for buildx
        run: |
          mkdir -p dist/linux-amd64 dist/linux-arm64
          install -m 0755 bins/bin-linux_x86_64/keel dist/linux-amd64/keel
          install -m 0755 bins/bin-linux_arm64/keel  dist/linux-arm64/keel

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # semver tags: 0.1.0-alpha for prereleases; stable tags additionally get
      # {major}.{minor} and latest (metadata-action skips those for prereleases).
      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub Release
    needs: [build, keelctl, container]
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          pattern: pkg-*
          path: pkgs
          merge-multiple: true

      - name: Checksums
        run: |
          cd pkgs
          sha256sum *.tar.gz > SHA256SUMS

      - name: Release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## Container"
            echo
            echo '```bash'
            echo "docker pull ${IMAGE}:${VERSION}"
            echo '```'
            echo
            echo "Multi-arch (linux/amd64, linux/arm64), \`FROM scratch\`, static MUSL binary."
            echo
            echo "## Binaries"
            echo
            echo "| File | Platform |"
            echo "|---|---|"
            for f in pkgs/*.tar.gz; do
              base=$(basename "$f")
              case "$base" in
                *linux_x86_64*)   plat="Linux x86_64 (MUSL, fully static)" ;;
                *linux_arm64*)    plat="Linux aarch64 (MUSL, fully static)" ;;
                *freebsd_x86_64*) plat="FreeBSD x86_64" ;;
                *macos_arm64*)    plat="macOS arm64" ;;
                *macos_x86_64*)   plat="macOS x86_64" ;;
                *)                plat="" ;;
              esac
              echo "| \`$base\` | $plat |"
            done
            echo
            echo "Verify with \`sha256sum -c SHA256SUMS\`."
            echo
            echo "keel binaries for FreeBSD are not yet provided: pingora-core pins a nix"
            echo "version that does not compile for FreeBSD against current libc. Planned"
            echo "once upstream updates. keelctl (the remote control CLI) has no such"
            echo "dependency and ships for FreeBSD, macOS, and Linux."
            echo
            echo "See CHANGELOG.md for what changed in this release."
          } > notes.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: notes.md
          files: |
            pkgs/*.tar.gz
            pkgs/SHA256SUMS
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
